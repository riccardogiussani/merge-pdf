<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF Merge</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --border-active: #555;
      --text: #e8e4dc;
      --muted: #666;
      --accent: #c8f060;
      --accent-dim: #8aaa30;
      --danger: #ff6b6b;
      --radius: 6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 2rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .badge {
      font-size: 0.65rem;
      font-family: 'DM Mono', monospace;
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      padding: 2px 7px;
      border-radius: 99px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      position: relative;
      top: -2px;
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .slots {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slot {
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 18px 20px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 72px;
    }

    .slot:hover {
      border-color: var(--border-active);
      background: #1c1c1c;
    }

    .slot.drag-over {
      border-color: var(--accent);
      background: #1a1f0e;
    }

    .slot.filled {
      border-style: solid;
      border-color: var(--border-active);
    }

    .slot input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .slot-icon {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1rem;
      transition: border-color 0.15s;
    }

    .slot.filled .slot-icon {
      border-color: var(--accent-dim);
      background: #1a1f0e;
    }

    .slot-label {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
      overflow: hidden;
    }

    .slot-number {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .slot-name {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .slot.filled .slot-name {
      color: var(--text);
    }

    .slot-size {
      font-size: 0.65rem;
      color: var(--muted);
    }

    .slot-clear {
      position: relative;
      z-index: 2;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      flex-shrink: 0;
      line-height: 1;
      transition: color 0.1s;
    }

    .slot-clear:hover { color: var(--danger); }

    .connector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .connector::before, .connector::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .merge-btn {
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      border-radius: var(--radius);
      padding: 15px 24px;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      width: 100%;
    }

    .merge-btn:hover:not(:disabled) {
      opacity: 0.88;
    }

    .merge-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .merge-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .status {
      font-size: 0.72rem;
      text-align: center;
      min-height: 1.2em;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }

    .status.idle { color: transparent; }
    .status.working { color: var(--muted); }
    .status.success { color: var(--accent); }
    .status.error { color: var(--danger); }

    footer {
      text-align: center;
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 0.05em;
    }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 1.5px solid var(--muted);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <h1>PDF Merge</h1>
      <span class="badge">client-side</span>
    </div>
    <p class="subtitle">Files never leave your browser. No server, no upload.</p>
  </header>

  <div class="slots">
    <!-- Slot A -->
    <div class="slot" id="slotA" ondragover="handleDragOver(event,'A')" ondragleave="handleDragLeave('A')" ondrop="handleDrop(event,'A')">
      <input type="file" accept=".pdf,application/pdf" onchange="handleFile(event,'A')" id="inputA">
      <div class="slot-icon" id="iconA">📄</div>
      <div class="slot-label">
        <span class="slot-number">First PDF</span>
        <span class="slot-name" id="nameA">Click or drag to select…</span>
        <span class="slot-size" id="sizeA"></span>
      </div>
      <button class="slot-clear" id="clearA" style="display:none" onclick="clearSlot('A')">✕</button>
    </div>

    <div class="connector">then</div>

    <!-- Slot B -->
    <div class="slot" id="slotB" ondragover="handleDragOver(event,'B')" ondragleave="handleDragLeave('B')" ondrop="handleDrop(event,'B')">
      <input type="file" accept=".pdf,application/pdf" onchange="handleFile(event,'B')" id="inputB">
      <div class="slot-icon" id="iconB">📄</div>
      <div class="slot-label">
        <span class="slot-number">Second PDF</span>
        <span class="slot-name" id="nameB">Click or drag to select…</span>
        <span class="slot-size" id="sizeB"></span>
      </div>
      <button class="slot-clear" id="clearB" style="display:none" onclick="clearSlot('B')">✕</button>
    </div>
  </div>

  <button class="merge-btn" id="mergeBtn" onclick="merge()" disabled>
    Merge & Download
  </button>

  <div class="status idle" id="status"></div>

  <footer>no data sent anywhere · works offline · open source via pdf-lib</footer>
</div>

<script>
  const files = { A: null, B: null };

  function fmt(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function setStatus(msg, type = 'idle') {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.innerHTML = msg;
  }

  function updateSlot(id, file) {
    files[id] = file;
    const slot  = document.getElementById('slot' + id);
    const name  = document.getElementById('name' + id);
    const size  = document.getElementById('size' + id);
    const clear = document.getElementById('clear' + id);
    const icon  = document.getElementById('icon' + id);

    if (file) {
      name.textContent  = file.name;
      size.textContent  = fmt(file.size);
      clear.style.display = 'block';
      slot.classList.add('filled');
      icon.textContent  = '📋';
    } else {
      const label = id === 'A' ? 'First PDF' : 'Second PDF';
      name.textContent  = 'Click or drag to select…';
      size.textContent  = '';
      clear.style.display = 'none';
      slot.classList.remove('filled');
      icon.textContent  = '📄';
      // reset file input
      document.getElementById('input' + id).value = '';
    }

    document.getElementById('mergeBtn').disabled = !(files.A && files.B);
    setStatus('', 'idle');
  }

  function handleFile(e, id) {
    const file = e.target.files[0];
    if (file) updateSlot(id, file);
  }

  function clearSlot(id) {
    event.stopPropagation();
    updateSlot(id, null);
  }

  function handleDragOver(e, id) {
    e.preventDefault();
    document.getElementById('slot' + id).classList.add('drag-over');
  }

  function handleDragLeave(id) {
    document.getElementById('slot' + id).classList.remove('drag-over');
  }

  function handleDrop(e, id) {
    e.preventDefault();
    document.getElementById('slot' + id).classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') {
      updateSlot(id, file);
    } else {
      setStatus('Please drop a PDF file.', 'error');
    }
  }

  async function merge() {
    if (!files.A || !files.B) return;

    const btn = document.getElementById('mergeBtn');
    btn.disabled = true;
    setStatus('<span class="spinner"></span>Merging…', 'working');

    try {
      const [bytesA, bytesB] = await Promise.all([
        files.A.arrayBuffer(),
        files.B.arrayBuffer()
      ]);

      const pdfA   = await PDFLib.PDFDocument.load(bytesA);
      const pdfB   = await PDFLib.PDFDocument.load(bytesB);
      const merged = await PDFLib.PDFDocument.create();

      const pagesA = await merged.copyPages(pdfA, pdfA.getPageIndices());
      const pagesB = await merged.copyPages(pdfB, pdfB.getPageIndices());

      pagesA.forEach(p => merged.addPage(p));
      pagesB.forEach(p => merged.addPage(p));

      const pdfBytes = await merged.save();
      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const url  = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href     = url;
      a.download = 'merged.pdf';
      a.click();
      URL.revokeObjectURL(url);

      const total = pdfA.getPageCount() + pdfB.getPageCount();
      setStatus(`✓ Done — ${total} pages · ${fmt(pdfBytes.length)}`, 'success');
    } catch (err) {
      console.error(err);
      setStatus('Error: ' + (err.message || 'Could not merge PDFs.'), 'error');
    } finally {
      btn.disabled = !(files.A && files.B);
    }
  }
</script>
</body>
</html>
