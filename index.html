<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced PDF Merge</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --border-active: #555;
      --text: #e8e4dc;
      --muted: #666;
      --accent: #c8f060;
      --accent-dim: #8aaa30;
      --danger: #ff6b6b;
      --radius: 6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    header { display: flex; justify-content: space-between; align-items: flex-end; }
    h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 2rem; color: var(--text); }
    .subtitle { font-size: 0.75rem; color: var(--muted); }

    .controls { display: flex; gap: 10px; }
    .btn {
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 18px; font-family: 'DM Mono', monospace;
      font-size: 0.8rem; cursor: pointer; transition: border-color 0.15s;
    }
    .btn:hover { border-color: var(--accent); }
    .btn-primary { background: var(--accent); color: #0e0e0e; font-weight: 500; border: none; }
    .btn-primary:hover { opacity: 0.88; }
    #fileInput { display: none; }

    #stack-container {
      display: none; text-align: center; padding: 20px; border: 1px dashed var(--accent);
      border-radius: var(--radius); background: #1a1f0e; margin-bottom: 20px;
    }
    .stack {
      display: inline-flex; align-items: center; justify-content: center; width: 4cm; height: 5.6cm;
      background: var(--surface); border: 1px solid var(--border-active); cursor: grab;
      box-shadow: 4px 4px 0px var(--border), 8px 8px 0px #111; color: var(--muted); font-size: 0.8rem;
    }

    #grid {
      display: flex; flex-wrap: wrap; gap: 16px; min-height: 200px; padding: 24px;
      border: 1px dashed var(--border); border-radius: var(--radius); background: var(--surface);
    }
    .page-item {
      width: 4cm; height: 5.6cm; background: #fff; position: relative; cursor: grab;
      border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .page-item canvas { width: 100%; height: 100%; object-fit: cover; }
    .page-item.drag-over { border: 2px dashed var(--accent); opacity: 0.5; }

    .delete-btn {
      position: absolute; top: 6px; right: 6px; background: var(--danger); color: #111;
      border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer;
      display: none; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; padding: 0; line-height: 1;
    }
    .page-item:hover .delete-btn { display: flex; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div>
      <h1>PDF Merge</h1>
      <p class="subtitle">Arrange, delete, and combine offline.</p>
    </div>
    <div class="controls">
      <label class="btn">
        Load PDF <input type="file" id="fileInput" accept="application/pdf">
      </label>
      <button class="btn btn-primary" onclick="exportPDF()">Export</button>
    </div>
  </header>

  <div id="stack-container">
    <p class="subtitle" style="margin-bottom: 12px; color: var(--text);">New PDF loaded. Drag the stack into the grid below.</p>
    <div class="stack" draggable="true" id="pdf-stack">Stack</div>
  </div>

  <div id="grid"></div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
  
  let mainPages = []; 
  let stackPages = [];
  let draggedElementId = null;

  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    const arrayBuffer = await file.arrayBuffer();
    const pdfJsDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    
    let newPages = [];
    for (let i = 1; i <= pdfJsDoc.numPages; i++) {
      const page = await pdfJsDoc.getPage(i);
      const viewport = page.getViewport({ scale: 0.5 });
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = viewport.width; canvas.height = viewport.height;
      await page.render({ canvasContext: ctx, viewport: viewport }).promise;
      
      newPages.push({ id: Math.random().toString(36).substr(2, 9), pdfBytes: arrayBuffer, pageIndex: i - 1, canvas: canvas });
    }

    if (mainPages.length === 0) {
      mainPages = newPages;
      renderGrid();
    } else {
      stackPages = newPages;
      document.getElementById('stack-container').style.display = 'block';
      document.getElementById('pdf-stack').textContent = `Stack (${newPages.length} pgs)`;
    }
    e.target.value = ''; 
  });

  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    mainPages.forEach((pageObj, index) => {
      const div = document.createElement('div');
      div.className = 'page-item';
      div.draggable = true;
      div.dataset.id = pageObj.id;
      div.appendChild(pageObj.canvas);

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.innerHTML = '✕';
      delBtn.onclick = () => { mainPages.splice(index, 1); renderGrid(); };
      div.appendChild(delBtn);

      div.addEventListener('dragstart', () => { draggedElementId = pageObj.id; });
      div.addEventListener('dragover', (e) => { e.preventDefault(); div.classList.add('drag-over'); });
      div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
      div.addEventListener('drop', (e) => handleDrop(e, index));

      grid.appendChild(div);
    });
  }

  document.getElementById('pdf-stack').addEventListener('dragstart', () => {
    draggedElementId = 'STACK';
  });

  function handleDrop(e, targetIndex) {
    e.preventDefault();
    document.querySelectorAll('.page-item').forEach(el => el.classList.remove('drag-over'));

    if (draggedElementId === 'STACK') {
      mainPages.splice(targetIndex, 0, ...stackPages);
      stackPages = [];
      document.getElementById('stack-container').style.display = 'none';
    } else if (draggedElementId) {
      const sourceIndex = mainPages.findIndex(p => p.id === draggedElementId);
      if (sourceIndex > -1 && sourceIndex !== targetIndex) {
        const [movedItem] = mainPages.splice(sourceIndex, 1);
        mainPages.splice(targetIndex, 0, movedItem);
      }
    }
    draggedElementId = null;
    renderGrid();
  }

  document.getElementById('grid').addEventListener('dragover', (e) => e.preventDefault());
  document.getElementById('grid').addEventListener('drop', (e) => {
    if (e.target.id === 'grid') handleDrop(e, mainPages.length);
  });

  async function exportPDF() {
    if (mainPages.length === 0) return alert('No pages to export.');
    
    const mergedPdf = await PDFLib.PDFDocument.create();
    const loadedDocs = new Map();

    for (const page of mainPages) {
      if (!loadedDocs.has(page.pdfBytes)) {
        loadedDocs.set(page.pdfBytes, await PDFLib.PDFDocument.load(page.pdfBytes));
      }
      const sourceDoc = loadedDocs.get(page.pdfBytes);
      const [copiedPage] = await mergedPdf.copyPages(sourceDoc, [page.pageIndex]);
      mergedPdf.addPage(copiedPage);
    }

    const pdfBytes = await mergedPdf.save();
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'merged.pdf';
    link.click();
  }
</script>
</body>
</html>
